## Home Assistant view used as a secondary page to check configured automations.
# GitHub repo: <https://github.com/melvinmajor/HomeAssistant-customisations>
# Author: Melvin Campos Casares
# Last updated: 04/04/2026 (DD/MM/YYYY)

kiosk_mode:
  non_admin_settings:
    hide_add_to_home_assistant: true
    hide_search: true
views:
  - title: Automations
    sections:
      - type: grid
        cards:
          - type: heading
            heading: System automations and helpers
            heading_style: title
            icon: mdi:home-assistant
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: automation.set_ha_theme_at_startup
            double_tap_action:
              action: none
            hold_action:
              action: none
            button_action:
              double_tap_action:
                action: none
              hold_action:
                action: none
            icon: ''
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: automation.reset_kill_switch
            double_tap_action:
              action: none
            hold_action:
              action: none
            button_action:
              double_tap_action:
                action: none
              hold_action:
                action: none
            icon: ''
            grid_options:
              columns: 6
              rows: auto
